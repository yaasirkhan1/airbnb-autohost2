<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoHost Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #e8e8e8;
    --muted: #888;
    --green: #3ecf8e;
    --green-dim: #1a3d2f;
    --amber: #f59e0b;
    --amber-dim: #3d2d0a;
    --red: #ef4444;
    --red-dim: #3d1212;
    --blue: #3b82f6;
    --blue-dim: #1a2a4a;
    --radius: 10px;
    --font: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'SF Mono', 'Fira Code', monospace;
  }

  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    padding: 1.25rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--surface);
  }
  .logo { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .logo span { color: var(--green); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-label { font-size: 13px; color: var(--muted); }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .stat { background: var(--surface); padding: 1.25rem 2rem; }
  .stat-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.02em; }
  .stat-val { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
  .stat-val.green { color: var(--green); }
  .stat-val.amber { color: var(--amber); }

  main { max-width: 900px; margin: 0 auto; padding: 2rem; }

  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .section-title { font-size: 14px; font-weight: 500; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }

  .empty { padding: 2.5rem; text-align: center; color: var(--muted); font-size: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
  .empty-icon { font-size: 28px; margin-bottom: 8px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: #3e3e3e; }
  .card-header { padding: 14px 18px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
  .guest-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--blue-dim); border: 1px solid var(--blue); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--blue); flex-shrink: 0; }
  .guest-name { font-size: 14px; font-weight: 500; }
  .property-name { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 99px; }
  .badge-pending { background: var(--amber-dim); color: var(--amber); border: 1px solid #5a3f0a; }
  .badge-sent { background: var(--green-dim); color: var(--green); border: 1px solid #1a5a3a; }
  .badge-cancelled { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .badge-failed { background: var(--red-dim); color: var(--red); border: 1px solid #5a1a1a; }
  .countdown { margin-left: auto; font-size: 12px; color: var(--amber); font-family: var(--mono); }

  .card-body { padding: 14px 18px; }
  .msg-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.04em; text-transform: uppercase; }
  .msg-text { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; font-style: italic; }
  .reply-edit { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 10px 12px; font-size: 13px; color: var(--text); font-family: var(--font); line-height: 1.6; resize: vertical; min-height: 70px; }
  .reply-edit:focus { outline: none; border-color: var(--green); }

  .card-actions { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; background: var(--surface2); }
  .btn { padding: 7px 14px; font-size: 12px; font-weight: 500; border-radius: 7px; border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s; font-family: var(--font); }
  .btn:hover { opacity: 0.85; }
  .btn:active { transform: scale(0.97); }
  .btn-green { background: var(--green); color: #000; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover { background: var(--surface2); }
  .btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid #5a1a1a; }
  .btn-save { background: var(--blue-dim); color: var(--blue); border: 1px solid var(--blue); }

  .log-section { margin-top: 2.5rem; }
  .log-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .log-row:last-child { border-bottom: none; }
  .log-guest { font-weight: 500; min-width: 130px; }
  .log-msg { color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-time { font-size: 11px; color: var(--muted); white-space: nowrap; font-family: var(--mono); }

  .refresh-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 7px; font-size: 12px; cursor: pointer; font-family: var(--font); }
  .refresh-btn:hover { color: var(--text); border-color: #444; }

  .pulse { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    main { padding: 1rem; }
    header { padding: 1rem; }
    .stat { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Auto<span>Host</span></div>
  <div class="header-right">
    <div class="status-dot pulse" id="statusDot"></div>
    <span class="status-label" id="statusLabel">Connecting...</span>
  </div>
</header>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Pending replies</div>
    <div class="stat-val amber" id="statPending">–</div>
  </div>
  <div class="stat">
    <div class="stat-label">Sent today</div>
    <div class="stat-val green" id="statSent">–</div>
  </div>
  <div class="stat">
    <div class="stat-label">Total sent</div>
    <div class="stat-val" id="statTotal">–</div>
  </div>
  <div class="stat">
    <div class="stat-label">Reply delay</div>
    <div class="stat-val" id="statDelay">–</div>
  </div>
</div>

<main>
  <div class="section-header">
    <span class="section-title">Pending queue</span>
    <button class="refresh-btn" onclick="load()">↻ Refresh</button>
  </div>
  <div id="pendingList"></div>

  <div class="log-section">
    <div class="section-header">
      <span class="section-title">Recent activity</span>
    </div>
    <div id="logList"></div>
  </div>
</main>

<script>
let data = { pending: [], log: [], settings: {} };
const todayStart = new Date().setHours(0,0,0,0);

async function load() {
  try {
    const res = await fetch('/api/queue');
    data = await res.json();
    render();
    document.getElementById('statusDot').style.background = '#3ecf8e';
    document.getElementById('statusLabel').textContent = 'Live';
  } catch(e) {
    document.getElementById('statusDot').style.background = '#ef4444';
    document.getElementById('statusLabel').textContent = 'Offline';
  }
}

function render() {
  const sentToday = data.log.filter(e => e.status === 'sent' && e.createdAt > todayStart).length;
  const totalSent = data.log.filter(e => e.status === 'sent').length;

  document.getElementById('statPending').textContent = data.pending.length;
  document.getElementById('statSent').textContent = sentToday;
  document.getElementById('statTotal').textContent = totalSent;
  document.getElementById('statDelay').textContent = (data.settings.delayMinutes || 5) + ' min';

  renderPending();
  renderLog();
}

function initials(name) {
  return (name || 'G').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}

function renderPending() {
  const el = document.getElementById('pendingList');
  if (!data.pending.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">✦</div>No pending replies — all clear</div>';
    return;
  }
  el.innerHTML = data.pending.map(entry => `
    <div class="card" id="card-${entry.id}">
      <div class="card-header">
        <div class="guest-avatar">${initials(entry.guestName)}</div>
        <div>
          <div class="guest-name">${entry.guestName}</div>
          <div class="property-name">${entry.propertyName || ''}</div>
        </div>
        <span class="badge badge-pending">● Pending</span>
        <span class="countdown" id="cd-${entry.id}" data-sendat="${entry.sendAt}"></span>
      </div>
      <div class="card-body">
        <div class="msg-label">Guest message</div>
        <div class="msg-text">"${esc(entry.originalMessage)}"</div>
        <div class="msg-label">Drafted reply — edit if needed</div>
        <textarea class="reply-edit" id="reply-${entry.id}">${esc(entry.editedReply)}</textarea>
      </div>
      <div class="card-actions">
        <button class="btn btn-save" onclick="saveEdit('${entry.id}')">Save edit</button>
        <button class="btn btn-green" onclick="sendNow('${entry.id}')">Send now</button>
        <button class="btn btn-danger" onclick="cancel('${entry.id}')">Cancel</button>
      </div>
    </div>
  `).join('');
}

function renderLog() {
  const el = document.getElementById('logList');
  if (!data.log.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">◈</div>No activity yet</div>';
    return;
  }
  const rows = data.log.slice(0, 30).map(e => `
    <div class="log-row">
      <span class="log-guest">${esc(e.guestName)}</span>
      <span class="log-msg">${esc(e.editedReply || e.draftedReply || '')}</span>
      <span class="badge ${e.status === 'sent' ? 'badge-sent' : e.status === 'cancelled' ? 'badge-cancelled' : 'badge-failed'}">${e.status}</span>
      <span class="log-time">${formatTime(e.createdAt)}</span>
    </div>
  `).join('');
  el.innerHTML = `<div style="background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:0 18px;">${rows}</div>`;
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function cancel(id) {
  if (!confirm('Cancel this reply?')) return;
  await fetch('/api/cancel/' + id, { method: 'POST' });
  load();
}

async function saveEdit(id) {
  const reply = document.getElementById('reply-' + id).value;
  await fetch('/api/edit/' + id, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ reply }) });
  const btn = event.currentTarget;
  btn.textContent = 'Saved ✓'; btn.style.background = '#1a3d2f';
  setTimeout(() => { btn.textContent = 'Save edit'; btn.style.background = ''; }, 1500);
}

async function sendNow(id) {
  const reply = document.getElementById('reply-' + id).value;
  await fetch('/api/edit/' + id, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ reply }) });
  await fetch('/api/send-now/' + id, { method: 'POST' });
  load();
}

// Live countdown timers
function tickCountdowns() {
  document.querySelectorAll('[data-sendat]').forEach(el => {
    const ms = parseInt(el.dataset.sendat) - Date.now();
    if (ms <= 0) { el.textContent = 'Sending...'; return; }
    const m = Math.floor(ms / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    el.textContent = `${m}:${String(s).padStart(2,'0')} until send`;
  });
}

load();
setInterval(load, 30000);
setInterval(tickCountdowns, 1000);
</script>
</body>
</html>
